{% extends 'base.html' %}
{% block title %}Clubs{% endblock %}

{% block content %}
<h2>All Clubs</h2>



<ul>
  {% for club in clubs %}
    <li>
      <a href="{{ url_for('club_detail', club_id=club[0]) }}">{{ club[1] }}</a> ({{ club[2] }})
    </li>
  {% endfor %}
</ul>

{% if session['user_type'] == 'sao_admin' %}
</br>
  <p><a href="{{ url_for('add_club') }}" style="font-weight: bold;">➕ Add New Club</a></p>
{% endif %}
{% endblock %}
