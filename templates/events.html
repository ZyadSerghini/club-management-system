{% extends 'base.html' %}
{% block title %}Events{% endblock %}
{% block content %}
<h2>All Events</h2>
<p>➕ <a href="{{ url_for('add_event') }}">Add New Event</a></p><br>
<ul>
{% for event in events %}
    <li><a href="{{ url_for('event_detail', event_id=event[0]) }}">{{ event[1] }}</a> ({{ event[2] }})</li>
{% endfor %}
</ul>
{% endblock %}
